<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<link rel="apple-touch-icon" href="icon.png">

<title>Workout Tracker V61</title>

<style>
  :root {
    --bg-color: #e8f4f8;
    --panel-bg: rgba(255, 255, 255, 0.6);
    --text-color: #333333;
    --border-color: #b0c4de;
    --btn-top: #87ceeb;
    --btn-bottom: #4682b4;
    --btn-border: #4169e1;
    --btn-text: #ffffff;
    --input-bg: #ffffff;
    --shadow: rgba(0, 0, 0, 0.2);
    --tooltip-bg: rgba(0, 0, 0, 0.8);
    --tooltip-text: #ffffff;
    --modal-overlay: rgba(0, 0, 0, 0.5);
    --card-bg: #ffffff;
  }

  body.mode-dark {
    --bg-color: #121212;
    --panel-bg: rgba(40, 40, 40, 0.6);
    --text-color: #e0e0e0;
    --border-color: #555555;
    --input-bg: #333333;
    --shadow: rgba(0, 0, 0, 0.7);
    --tooltip-bg: rgba(255, 255, 255, 0.9);
    --tooltip-text: #000000;
    --modal-overlay: rgba(0, 0, 0, 0.7);
    --card-bg: #2a2a2a;
  }

  body.mode-dark.color-blue {
    --bg-color: #121518;
    --border-color: #334455;
    --btn-top: #4682b4;
    --btn-bottom: #191970;
    --btn-border: #000080;
  }

  body.color-green {
    --bg-color: #e8f8e8;
    --border-color: #b0deb0;
    --btn-top: #87eb87;
    --btn-bottom: #46b446;
    --btn-border: #228b22;
  }
  body.mode-dark.color-green {
    --bg-color: #121812;
    --border-color: #335533;
    --btn-top: #46b446;
    --btn-bottom: #006400;
    --btn-border: #004d00;
  }

  body.color-orange {
    --bg-color: #f8eee8;
    --border-color: #decab0;
    --btn-top: #ebba87;
    --btn-bottom: #b47846;
    --btn-border: #d2691e;
  }
  body.mode-dark.color-orange {
    --bg-color: #181412;
    --border-color: #554433;
    --btn-top: #b47846;
    --btn-bottom: #8b4513;
    --btn-border: #a0522d;
  }

  body.color-mono {
    --bg-color: #f0f0f0;
    --border-color: #cccccc;
    --btn-top: #aaaaaa;
    --btn-bottom: #555555;
    --btn-border: #333333;
  }
  body.mode-dark.color-mono {
    --bg-color: #1a1a1a;
    --border-color: #444444;
    --btn-top: #555555;
    --btn-bottom: #222222;
    --btn-border: #000000;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { overflow-x: hidden; width: 100%; max-width: 100vw; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 20px 15px; padding-top: env(safe-area-inset-top, 20px); padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 60px);
    max-width: 800px; margin: auto; background-color: var(--bg-color); color: var(--text-color);
    transition: background-color 0.3s, color 0.3s; -webkit-tap-highlight-color: transparent;
  }

  .glass-panel {
    background: var(--panel-bg); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 20px;
    box-shadow: 0 4px 15px var(--shadow); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); margin-bottom: 20px; width: 100%;
  }

  .scroll-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .tab-buttons { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; width: 100%; overflow-x: auto; overflow-y: hidden; touch-action: pan-x; scrollbar-width: none; }
  .tab-buttons::-webkit-scrollbar { display: none; }
  .tab-btn { padding: 12px 10px; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--text-color); outline: none; font-size: 14px; flex: 1; text-align: center; white-space: nowrap; min-width: 60px; }
  .tab-btn.active { border: 2px solid var(--border-color); border-bottom: 2px solid var(--bg-color); margin-bottom: -2px; font-weight: bold; border-radius: 8px 8px 0 0; background: var(--panel-bg); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .form-group { margin-bottom: 15px; width: 100%; }
  label { display: block; margin-bottom: 5px; font-weight: bold; }
  input[type="number"], input[type="text"], input[type="date"], input[type="time"], select, textarea {
    padding: 10px; width: 100%; min-width: 0; background: var(--input-bg); color: var(--text-color);
    border: 1px solid var(--border-color); border-radius: 6px; font-size: 16px; box-sizing: border-box;
    transition: opacity 0.3s;
  }
  input:disabled, select:disabled, textarea:disabled { opacity: 0.5; cursor: not-allowed; }
  textarea { resize: vertical; min-height: 80px; }
  .checkbox-group { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .checkbox-group input { width: auto; margin-right: 10px; transform: scale(1.2); }

  .star-rating-container { display: inline-flex; gap: 4px; font-size: 28px; color: var(--border-color); cursor: pointer; user-select: none; margin-bottom: 5px; }
  .star-rating-container .star.active { color: #ffc700; text-shadow: 0 0 5px rgba(255, 199, 0, 0.4); }

  .review-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px var(--shadow); }
  .review-card-header { font-weight: bold; font-size: 18px; margin-bottom: 5px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
  .review-card-context { font-size: 14px; color: var(--text-color); opacity: 0.8; margin-bottom: 15px; line-height: 1.4; }

  .set-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; background: rgba(128, 128, 128, 0.1); padding: 10px; border-radius: 8px; width: 100%; }
  .set-row > div { flex: 1 1 100px; display: flex; flex-direction: column; min-width: 0; }
  .weight-input-group { display: flex; align-items: center; width: 100%; gap: 5px; }
  .weight-input-group input[type="number"] { flex: 1; width: auto; min-width: 0; }
  .unit-select { width: 75px; flex-shrink: 0; margin-left: 0; }
  .add-exercise-flex { display: flex; gap: 10px; width: 100%; }
  .add-exercise-flex input { flex: 1; width: auto; min-width: 0; }
  .add-exercise-flex button { width: auto; padding: 8px 20px; flex-shrink: 0; margin: 0; }
  .date-range-flex { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; width: 100%; }
  .date-range-flex input { flex: 1; width: auto; min-width: 100px; }

  .glossy-btn {
    padding: 14px 20px; background: linear-gradient(to bottom, var(--btn-top) 0%, var(--btn-bottom) 100%);
    color: var(--btn-text); border: 1px solid var(--btn-border); border-radius: 24px; cursor: pointer;
    width: 100%; font-size: 16px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    box-shadow: inset 0px 1px 0px rgba(255,255,255,0.4), 0px 4px 6px var(--shadow); transition: all 0.2s;
  }
  .glossy-btn:active { background: linear-gradient(to bottom, var(--btn-bottom) 0%, var(--btn-top) 100%); box-shadow: inset 0px 2px 5px rgba(0,0,0,0.5); transform: translateY(2px); }
  .glossy-btn:disabled { background: var(--border-color); color: #888888; border-color: var(--border-color); cursor: not-allowed; box-shadow: none; text-shadow: none; }
  .danger-btn { background: linear-gradient(to bottom, #ff7e7e 0%, #d63030 100%); border: 1px solid #b52b2b; margin-top: 10px; }
  .danger-btn:active { background: linear-gradient(to bottom, #d63030 0%, #ff7e7e 100%); }

  .action-btn { padding: 8px 12px; font-size: 14px; border: 1px solid var(--btn-border); border-radius: 6px; background: var(--btn-top); color: var(--btn-text); cursor: pointer; margin-right: 4px; margin-bottom: 4px; }
  .action-btn-danger { background: #d63030; border: 1px solid #b52b2b; }

  table { width: 100%; border-collapse: collapse; min-width: 500px; }
  th, td { border: 1px solid var(--border-color); padding: 10px 8px; text-align: left; vertical-align: middle; word-break: break-word; }
  th { background: rgba(128, 128, 128, 0.2); font-weight: bold; }

  .canvas-container { position: relative; width: 100%; overflow: auto; max-height: 70vh; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; margin-top: 10px; }
  .graph-svg { display: block; }
  #tooltip { position: absolute; display: none; background: var(--tooltip-bg); color: var(--tooltip-text); padding: 8px; border-radius: 4px; pointer-events: none; font-size: 12px; white-space: nowrap; z-index: 100; box-shadow: 0 2px 5px var(--shadow); }
  .controls-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: flex-end; width: 100%; }
  .controls-row > div { flex: 1 1 150px; min-width: 0; }

  #edit-modal-overlay, #login-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); display: none; align-items: center; justify-content: center; z-index: 1000; }
  #edit-modal, #login-modal { width: 90%; max-width: 400px; margin-bottom: 0; }
  .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }

  #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 400px; }
  .date-nav-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); font-size: 18px; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  .date-nav-btn:active { background: var(--border-color); }

  @media (max-width: 480px) {
    .glass-panel { padding: 15px 10px; }
    input[type="number"], input[type="text"], input[type="date"], input[type="time"], select, textarea { padding: 8px; }
    .set-row { padding: 8px; }
    .tab-btn { padding: 12px 2px; font-size: 13px; }
  }
</style>
</head>
<body>

<div id="toast-container"></div>

<div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
  <button onclick="openLoginModal()" style="background: var(--panel-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; box-shadow: 0 2px 5px var(--shadow); display: flex; align-items: center; gap: 8px;">
    <span id="header-login-icon" style="display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; font-size: 18px;">👤</span> 
    <span id="header-login-text" class="gdrive-status-text">未接続</span>
  </button>
</div>

<div class="tab-buttons">
  <button class="tab-btn active" onclick="switchTab('input')">入力</button>
  <button class="tab-btn" onclick="switchTab('review')">振り返り</button>
  <button class="tab-btn" onclick="switchTab('logs')">ログ</button>
  <button class="tab-btn" onclick="switchTab('graph')">グラフ</button>
  <button class="tab-btn" onclick="switchTab('exercises')">種目</button>
  <button class="tab-btn" onclick="switchTab('settings')">設定</button>
</div>

<div id="tab-input" class="tab-content active glass-panel">
  <div class="form-group">
    <label>記録日時</label>
    <div class="date-range-flex">
      <input type="date" id="record-date" onchange="saveDraft()">
      <input type="time" id="record-time" onchange="saveDraft()">
    </div>
    <button class="action-btn" style="margin-top: 8px;" onclick="setNow()">現在時刻に戻す</button>
    <div class="checkbox-group" style="margin-top: 8px;">
      <input type="checkbox" id="use-current-time-check" checked onchange="toggleTimeInputs(); saveDraft();">
      <label for="use-current-time-check" style="margin:0;">現在時刻で記録する</label>
    </div>
  </div>

  <div class="controls-row">
    <div class="form-group">
      <label for="category">カテゴリ</label>
      <select id="category" onchange="updateExerciseList(); saveDraft();">
        <option value="マシン">マシン</option>
        <option value="フリーウエイト">フリーウエイト</option>
        <option value="ケーブル">ケーブル</option>
        <option value="自重">自重</option>
        <option value="有酸素">有酸素</option>
      </select>
    </div>
    <div class="form-group" style="flex: 2;">
      <label for="exercise">種目</label>
      <select id="exercise" onchange="saveDraft()"></select>
    </div>
  </div>

  <button id="toggle-rating-btn" onclick="toggleInputRating(); saveDraft();" style="background:none; border:none; color:var(--btn-bottom); font-weight:bold; font-size: 15px; cursor:pointer; padding:0; margin-bottom:15px; text-align: left; width: 100%;">
    ＋ 評価とコメントを追加 (任意)
  </button>

  <div class="form-group" id="input-rating-section" style="display:none; padding-top:10px; border-top:1px dashed var(--border-color);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
      <label style="margin: 0;">種目全体の評価</label>
      <button class="action-btn" style="margin: 0; padding: 2px 8px; font-size: 12px; background: transparent; color: var(--btn-bottom); border: 1px solid var(--btn-bottom);" onclick="setRating('input', 0); saveDraft();">星をリセット</button>
    </div>
    <div class="star-rating-container" id="input-star-rating">
      <span class="star" onclick="setRating('input', 1); saveDraft();">★</span>
      <span class="star" onclick="setRating('input', 2); saveDraft();">★</span>
      <span class="star" onclick="setRating('input', 3); saveDraft();">★</span>
      <span class="star" onclick="setRating('input', 4); saveDraft();">★</span>
      <span class="star" onclick="setRating('input', 5); saveDraft();">★</span>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; margin-top: 10px;">
      <label style="margin: 0;">種目全体のコメント</label>
      <button class="action-btn" style="margin: 0; padding: 2px 8px; font-size: 12px; background: transparent; color: var(--btn-bottom); border: 1px solid var(--btn-bottom);" onclick="document.getElementById('input-comment').value = ''; saveDraft();">コメントを消去</button>
    </div>
    <textarea id="input-comment" placeholder="フォームの感覚や調子などのコメントを記録..." oninput="saveDraft()"></textarea>
  </div>

  <div class="form-group">
    <label for="set-count">セット数</label>
    <input type="number" id="set-count" min="1" onchange="renderSetInputs(); saveDraft();">
  </div>

  <div class="form-group checkbox-group">
    <input type="checkbox" id="common-check" checked onchange="renderSetInputs(); saveDraft();">
    <label for="common-check" style="margin:0;">全セット共通</label>
  </div>

  <div id="set-inputs-container"></div>

  <button class="glossy-btn" onclick="addLog()">記録を追加</button>
</div>

<div id="tab-review" class="tab-content glass-panel">
  <h3>評価と振り返り</h3>
  <div class="controls-row">
    <div class="form-group">
      <label for="review-level">表示モード</label>
      <select id="review-level" onchange="updateReviewUI()">
        <option value="day">日付ごと (全体の総括・種目・セット階層表示)</option>
        <option value="exercise">種目ごと (その種目の評価)</option>
        <option value="set">セットごと (個別の評価)</option>
      </select>
    </div>
  </div>

  <div class="controls-row" id="review-exercise-row" style="display: none;">
    <div class="form-group">
      <label for="review-target-exercise">対象種目</label>
      <select id="review-target-exercise" onchange="renderReviewList()"></select>
    </div>
  </div>

  <div id="review-date-control-area">
    <div id="review-single-ui" class="controls-row" style="display: none; align-items: center; justify-content: center; flex-wrap: nowrap;">
      <button class="date-nav-btn" onclick="changeDate('review-target-date', -1)">&lt;</button>
      <input type="date" id="review-target-date" onchange="renderReviewList()" style="width: auto; text-align: center;">
      <button class="date-nav-btn" onclick="changeDate('review-target-date', 1)">&gt;</button>
    </div>

    <div id="review-list-ui" style="display: block;">
      <div class="controls-row" id="review-list-sort-group" style="display: none;">
        <div class="form-group">
          <label>ソート順</label>
          <select id="review-date-sort" onchange="renderReviewList()">
            <option value="date-desc">日時 (新しい順)</option>
            <option value="date-asc">日時 (古い順)</option>
          </select>
        </div>
      </div>
      <div class="controls-row">
        <div class="form-group checkbox-group" style="flex: 1;">
          <input type="checkbox" id="review-date-filter-check" onchange="updateReviewUI()">
          <label for="review-date-filter-check" style="margin:0;">日付範囲で絞り込む</label>
        </div>
        <div class="form-group" id="review-date-inputs" style="display: none; flex: 2;">
          <div class="date-range-flex">
            <input type="date" id="review-start-date" onchange="renderReviewList()">
            <span>〜</span>
            <input type="date" id="review-end-date" onchange="renderReviewList()">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="review-container"></div>
</div>

<div id="tab-logs" class="tab-content glass-panel">
  <h3>筋トレログ</h3>
  <div class="controls-row">
    <div class="form-group">
      <label for="log-view-mode">表示モード</label>
      <select id="log-view-mode" onchange="updateLogUI()">
        <option value="date">日付ごと</option>
        <option value="exercise">種目ごと</option>
      </select>
    </div>
  </div>

  <div class="controls-row" id="log-exercise-select-row" style="display: none;">
    <div class="form-group">
      <label for="log-target-exercise">対象種目</label>
      <select id="log-target-exercise" onchange="renderLogList()"></select>
    </div>
  </div>

  <div id="log-date-control-area">
    <div id="log-single-ui" class="controls-row" style="display: none; align-items: center; justify-content: center; flex-wrap: nowrap;">
      <button class="date-nav-btn" onclick="changeDate('log-single-date', -1)">&lt;</button>
      <input type="date" id="log-single-date" onchange="renderLogList()" style="width: auto; text-align: center;">
      <button class="date-nav-btn" onclick="changeDate('log-single-date', 1)">&gt;</button>
    </div>

    <div id="log-list-ui" style="display: block;">
      <div class="controls-row" id="log-sort-control-group" style="display: none;">
        <div class="form-group">
          <label>ソート順</label>
          <select id="log-sort-mode" onchange="renderLogList()">
            <option value="date-desc">日時 (新しい順)</option>
            <option value="date-asc">日時 (古い順)</option>
            <option value="weight-desc">最大重量 (重い順)</option>
            <option value="weight-asc">最大重量 (軽い順)</option>
            <option value="reps-desc">最大回数 (多い順)</option>
            <option value="reps-asc">最大回数 (少ない順)</option>
          </select>
        </div>
      </div>
      <div class="controls-row" id="log-list-sort-group">
        <div class="form-group">
          <label>ソート順</label>
          <select id="log-date-sort" onchange="renderLogList()">
            <option value="date-desc">日時 (新しい順)</option>
            <option value="date-asc">日時 (古い順)</option>
          </select>
        </div>
      </div>
      <div class="controls-row">
        <div class="form-group checkbox-group" style="flex: 1;">
          <input type="checkbox" id="log-date-filter-check" onchange="updateLogUI()">
          <label for="log-date-filter-check" style="margin:0;">日付範囲で絞り込む</label>
        </div>
        <div class="form-group" id="log-date-inputs" style="display: none; flex: 2;">
          <div class="date-range-flex">
            <input type="date" id="log-start-date" onchange="renderLogList()">
            <span>〜</span>
            <input type="date" id="log-end-date" onchange="renderLogList()">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="scroll-wrapper">
    <div id="log-list"></div>
  </div>
</div>

<div id="tab-graph" class="tab-content glass-panel">
  <h3>グラフ分析</h3>
  <div class="controls-row">
    <div class="form-group">
      <label for="graph-exercise">分析する種目</label>
      <select id="graph-exercise" onchange="drawGraph()"></select>
    </div>
    <div class="form-group">
      <label for="graph-unit">表示単位</label>
      <select id="graph-unit" onchange="drawGraph()">
        <option value="lbs">lbs</option>
        <option value="kg">kg</option>
      </select>
    </div>
  </div>

  <div class="controls-row">
    <div class="form-group checkbox-group" style="flex: 1;">
      <input type="checkbox" id="graph-date-filter-check" onchange="toggleGraphDateFilter()">
      <label for="graph-date-filter-check" style="margin:0;">日付範囲で絞り込む</label>
    </div>
    <div class="form-group" id="graph-date-inputs" style="display: none; flex: 2;">
      <div class="date-range-flex">
        <input type="date" id="graph-start-date" onchange="drawGraph()">
        <span>〜</span>
        <input type="date" id="graph-end-date" onchange="drawGraph()">
      </div>
    </div>
  </div>

  <div class="controls-row">
    <div class="form-group checkbox-group">
      <input type="checkbox" id="graph-show-arrows" checked onchange="updateSettings()">
      <label for="graph-show-arrows" style="margin:0;">推移の矢印を表示する</label>
    </div>
  </div>

  <div class="controls-row" style="margin-bottom: 0; align-items: center;">
    <div class="form-group" style="margin-bottom: 0; flex: 1;">
      <button class="glossy-btn" onclick="drawGraph()">グラフを描画</button>
    </div>
    <div style="display: flex; gap: 5px; flex: 1;">
      <select id="download-format" style="width: auto; flex-shrink: 0; padding: 10px;">

<script>

  const defaultExerciseCategories = {

      "インクラインプレス", "チェストプレス", "デルトイドフライ", "オーバーヘッドプレス",

    ],
    "ケーブル": ["ケーブルクロスオーバー", "プレスダウン", "ケーブルカール", "フェイスプル", "ケーブルクランチ"],
    "自重": ["懸垂", "腕立て伏せ", "クランチ", "プランク", "ディップス", "ランジ", "カーフレイズ"],
    "有酸素": ["ランニング", "ウォーキング", "水泳", "自転車", "縄跳び", "ステアマスター"]
  };
  let customExerciseCategories = {};
  let savedCustomOrders = {};

  function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.innerText = message;
    toast.style.padding = '12px 20px'; toast.style.borderRadius = '8px'; toast.style.color = '#ffffff';
    toast.style.fontSize = '14px'; toast.style.fontWeight = 'bold'; toast.style.boxShadow = '0 4px 10px rgba(0,0,0,0.3)';
    toast.style.transition = 'opacity 0.3s, transform 0.3s'; toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)';
    toast.style.textAlign = 'center';
    
    if (type === 'error') toast.style.background = 'linear-gradient(to bottom, #ff7e7e 0%, #d63030 100%)';
    else if (type === 'info') toast.style.background = 'linear-gradient(to bottom, #87ceeb 0%, #4682b4 100%)';
    else toast.style.background = 'linear-gradient(to bottom, #7ceeb0 0%, #30d676 100%)';

    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '1'; toast.style.transform = 'translateY(0)'; }, 10);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)'; setTimeout(() => { container.removeChild(toast); }, 300); }, 5000);
  }

  function setNow() {
    const now = new Date(); const tzOffset = now.getTimezoneOffset() * 60000;
    const localISOTime = (new Date(now - tzOffset)).toISOString().slice(0, 16);
    const [datePart, timePart] = localISOTime.split('T');
    document.getElementById('record-date').value = datePart;
    document.getElementById('record-time').value = timePart;
    saveDraft();
    showToast('現在時刻にリセットしたぞ！', 'info');
  }

  function toggleTimeInputs() {
    const isChecked = document.getElementById('use-current-time-check').checked;
    document.getElementById('record-date').disabled = isChecked;
    document.getElementById('record-time').disabled = isChecked;
  }

  function handleUnitChange(selectEl, repsId) {
    if(!selectEl) return;
    const repsEl = document.getElementById(repsId);
    if(!repsEl) return;
    if(selectEl.value === '分') {
      repsEl.value = '';
      repsEl.disabled = true;
    } else {
      repsEl.disabled = false;
    }
  }

  function changeDate(inputId, delta) {
    const input = document.getElementById(inputId);
    if (!input.value) return;
    const currentDateStr = input.value;
    
    let dates = [...new Set(logs.map(l => l.date.split('T')[0]))].sort();
    if (dates.length === 0) {
      showToast('データが存在しないぞ。', 'info');
      return;
    }
    
    let currentIndex = dates.indexOf(currentDateStr);
    if (currentIndex === -1) {
      const futureDates = dates.filter(d => d > currentDateStr);
      const pastDates = dates.filter(d => d < currentDateStr);
      if (delta > 0 && futureDates.length > 0) {
        input.value = futureDates[0];
      } else if (delta < 0 && pastDates.length > 0) {
        input.value = pastDates[pastDates.length - 1];
      } else {
        showToast('これ以上データが存在しないぞ。', 'info');
        return;
      }
    } else {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < dates.length) {
        input.value = dates[newIndex];
      } else {
        showToast('これ以上データが存在しないぞ。', 'info');
        return;
      }
    }
    input.dispatchEvent(new Event('change'));
  }

  // --- ドラフト機能（自動保存と復元） ---
  function saveDraft() {
    const draft = {
      date: document.getElementById('record-date').value,
      time: document.getElementById('record-time').value,
      category: document.getElementById('category').value,
      exercise: document.getElementById('exercise').value,
      inputRatingVisible: document.getElementById('input-rating-section').style.display !== 'none',
      inputRating: currentInputRating,
      inputComment: document.getElementById('input-comment').value,
      setCount: document.getElementById('set-count').value,
      isCommon: document.getElementById('common-check').checked,
      useCurrentTime: document.getElementById('use-current-time-check').checked,
      sets: {}
    };
    
    const container = document.getElementById('set-inputs-container');
    const rows = container.querySelectorAll('.set-row');
    rows.forEach((row) => {
       const weightInput = row.querySelector('input[id^="weight-"]');
       if(!weightInput) return;
       const idx = weightInput.id.split('-')[1];
       draft.sets[idx] = {
         weight: weightInput.value,
         unit: document.getElementById(`unit-${idx}`).value,
         reps: document.getElementById(`reps-${idx}`).value,
         comment: document.getElementById(`set-comment-${idx}`) ? document.getElementById(`set-comment-${idx}`).value : '',
         star: currentSetRatings[idx] || 0
       };
    });
    localStorage.setItem('workout_tracker_draft', JSON.stringify(draft));
  }

  function restoreDraft() {
    const draftStr = localStorage.getItem('workout_tracker_draft');
    if (!draftStr) return false;
    try {
      const draft = JSON.parse(draftStr);
      document.getElementById('record-date').value = draft.date || '';
      document.getElementById('record-time').value = draft.time || '';
      document.getElementById('category').value = draft.category || 'マシン';
      updateExerciseList();
      if (draft.exercise) document.getElementById('exercise').value = draft.exercise;
      
      document.getElementById('use-current-time-check').checked = draft.useCurrentTime !== undefined ? draft.useCurrentTime : true;
      toggleTimeInputs();

      if (draft.inputRatingVisible) {
        document.getElementById('input-rating-section').style.display = 'block';
        document.getElementById('toggle-rating-btn').innerText = 'ー 評価とコメントを閉じる';
      } else {
        document.getElementById('input-rating-section').style.display = 'none';
        document.getElementById('toggle-rating-btn').innerText = '＋ 評価とコメントを追加 (任意)';
      }
      setRating('input', draft.inputRating || 0);
      document.getElementById('input-comment').value = draft.inputComment || '';
      
      document.getElementById('set-count').value = draft.setCount || currentDefaultSetCount;
      document.getElementById('common-check').checked = draft.isCommon !== undefined ? draft.isCommon : true;
      
      window.tempDraftSets = draft.sets;
      renderSetInputs();
      window.tempDraftSets = null; 
      return true;
    } catch (e) {
      console.error("Draft restore failed", e);
      return false;
    }
  }

  document.getElementById('tab-input').addEventListener('input', saveDraft);
  document.getElementById('tab-input').addEventListener('change', saveDraft);


  const CLIENT_ID = '119735837342-7jqp7nn2b34ro6r47s1ggsh3fckdfa36.apps.googleusercontent.com';
  const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';

  function updateSyncStatus(msg, color) {
    document.querySelectorAll('.gdrive-status-text').forEach(el => { 
      if(el.id !== 'header-login-text') { el.innerText = msg; el.style.color = color; }

  async function fetchUserInfo() {
    if (!gAccessToken) return;
    try {
      const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${gAccessToken}` } });
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('gdrive_user_info', JSON.stringify(data));
        displayUserInfoUI(data);
        updateSyncStatus('接続済み', 'var(--btn-bottom)');
      }
    } catch(e) { console.error('Failed to fetch user info:', e); }

    }

  function gapiLoaded() { gapi.load('client', () => { gapi.client.init({}).then(() => { isGapiLoaded = true; checkAndRestoreToken(); }); }); }

  function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: (tokenResponse) => {
        if (tokenResponse && tokenResponse.access_token) {
          if (google.accounts.oauth2.hasGrantedAnyScope(tokenResponse, 'https://www.googleapis.com/auth/drive.file')) {
            gAccessToken = tokenResponse.access_token; 
            localStorage.setItem('gdrive_access_token', gAccessToken);
            if (isGapiLoaded) gapi.client.setToken({access_token: gAccessToken});
            updateDriveUI(true); fetchUserInfo(); showToast('Googleドライブに接続したぞ！', 'success');
          } else {
            alert("【重要】必要な権限が許可されなかった．連携画面でチェックボックスにチェックを入れてくれ．");
            google.accounts.oauth2.revoke(tokenResponse.access_token, () => {});
            gAccessToken = null; updateDriveUI(false);
          }
        }
      },
    });
    isGisLoaded = true; checkAndRestoreToken();
  }

  function checkAndRestoreToken() {
    if (isGapiLoaded && isGisLoaded) {
      const savedToken = localStorage.getItem('gdrive_access_token');
      if (savedToken) { 
        gAccessToken = savedToken; gapi.client.setToken({access_token: gAccessToken}); 
        updateDriveUI(true); 
        const savedUser = localStorage.getItem('gdrive_user_info');
        if (savedUser) { displayUserInfoUI(JSON.parse(savedUser)); updateSyncStatus('接続済み', 'var(--btn-bottom)'); }
        else { fetchUserInfo(); }
      }
    }
  }

  function closeLoginModal() { document.getElementById('login-modal-overlay').style.display = 'none'; }
  function handleAuthClick() {

    tokenClient.requestAccessToken({prompt: 'consent'});

  function handleSignoutClick() {
    if (gAccessToken) {
      google.accounts.oauth2.revoke(gAccessToken, () => {

  async function findDriveFile() {
    const res = await gapi.client.request({ path: '/drive/v3/files', method: 'GET', params: { q: "name='workout_tracker_backup.json' and trashed=false", spaces: 'drive' } });
    return res.result.files && res.result.files.length > 0 ? res.result.files[0].id : null;
  }

  async function saveToDrive(isBackground = false) {
    if(!gAccessToken || !isGapiLoaded) return;
    if (!isBackground) document.querySelectorAll('.btn-gdrive-save').forEach(btn => btn.innerText = '保存中...');
    else updateSyncStatus('同期中...', '#888888');
    
    try {
      const backupData = JSON.stringify({
        logs: logs, dailyEvals: dailyEvals, customExerciseCategories: customExerciseCategories,
        savedCustomOrders: savedCustomOrders, settings: JSON.parse(localStorage.getItem('workout_tracker_settings') || '{}')
      });
      let fileId = await findDriveFile();
      if (!fileId) {
        const createRes = await gapi.client.request({ path: '/drive/v3/files', method: 'POST', body: { name: 'workout_tracker_backup.json' } });
        fileId = createRes.result.id;
      }
      await gapi.client.request({ path: '/upload/drive/v3/files/' + fileId, method: 'PATCH', params: { uploadType: 'media' }, body: backupData });
      
      if (!isBackground) showToast('Googleドライブへのバックアップが完了したぞ！', 'success');
      else { updateSyncStatus('同期完了', 'var(--btn-bottom)'); setTimeout(() => { if (gAccessToken) updateSyncStatus('接続済み', 'var(--btn-bottom)'); }, 3000); }
    } catch(e) {
      if (!isBackground) showToast('保存エラー: ' + (e.result && e.result.error ? e.result.error.message : e.message), 'error');
      else updateSyncStatus('自動保存失敗', 'red');
    } finally {
      if (!isBackground) document.querySelectorAll('.btn-gdrive-save').forEach(btn => btn.innerText = 'ドライブへ保存');
    }
  }

  async function loadFromDrive() {
    if(!gAccessToken || !isGapiLoaded) return;
    if(!confirm('現在の端末のデータが上書きされるが，よいだろうか？')) return;
    document.querySelectorAll('.btn-gdrive-load').forEach(btn => btn.innerText = '復元中...');
    try {
      let fileId = await findDriveFile();
      if (!fileId) { showToast('バックアップデータが見つからない．', 'error'); return; }
      const res = await gapi.client.request({ path: '/drive/v3/files/' + fileId, method: 'GET', params: { alt: 'media' } });
      let data = res.result;
      if (typeof data === 'string') data = JSON.parse(data); else if (!data && res.body) data = JSON.parse(res.body);

      if(data.logs) logs = data.logs; if(data.dailyEvals) dailyEvals = data.dailyEvals;
      if(data.customExerciseCategories) customExerciseCategories = data.customExerciseCategories;
      if(data.savedCustomOrders) savedCustomOrders = data.savedCustomOrders;
      if(data.settings) localStorage.setItem('workout_tracker_settings', JSON.stringify(data.settings));

      saveLocalData(); saveLocalCategories(); loadLocalSettings(); updateGlobalExerciseOptions();
      updateLogUI(); drawGraph(); updateReviewUI(); renderExerciseEditList();
      showToast('クラウドからの復元が完了したぞ！', 'success');
    } catch(e) {
      showToast('復元エラー: ' + (e.result && e.result.error ? e.result.error.message : e.message), 'error');
    } finally {
      document.querySelectorAll('.btn-gdrive-load').forEach(btn => btn.innerText = 'ドライブから復元');
    }
  }

  function initDates() {
    const now = new Date(); const tzOffset = now.getTimezoneOffset() * 60000;
    const localISOTime = (new Date(now - tzOffset)).toISOString().slice(0, 16);
    const [datePart, timePart] = localISOTime.split('T');
    
    document.getElementById('record-date').value = datePart;
    document.getElementById('record-time').value = timePart;
    document.getElementById('review-target-date').value = datePart;
    document.getElementById('log-single-date').value = datePart;
    
    const past = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000); 
    const pastStr = (new Date(past - tzOffset)).toISOString().split('T')[0];
    
    document.getElementById('log-start-date').value = pastStr;
    document.getElementById('log-end-date').value = datePart;
    document.getElementById('graph-start-date').value = pastStr;
    document.getElementById('graph-end-date').value = datePart;
    document.getElementById('review-start-date').value = pastStr;
    document.getElementById('review-end-date').value = datePart;
  }

  function updateExerciseList() {
    const cat = document.getElementById('category').value; const selectEl = document.getElementById('exercise');
    selectEl.innerHTML = '<option value="" disabled selected style="display:none;">種目を選択してくれ</option>';
    if (customExerciseCategories[cat]) { customExerciseCategories[cat].forEach(ex => { selectEl.innerHTML += `<option value="${ex}">${ex}</option>`; }); }

  function renderExerciseEditList() {
    const cat = document.getElementById('edit-category').value; const list = customExerciseCategories[cat] || []; const tbody = document.getElementById('exercise-edit-tbody'); tbody.innerHTML = '';
    list.forEach((ex, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${ex}</td><td style="white-space: nowrap;"><button class="action-btn" onclick="moveExercise(${idx}, -1)" ${idx === 0 ? 'disabled' : ''}>↑</button><button class="action-btn" onclick="moveExercise(${idx}, 1)" ${idx === list.length - 1 ? 'disabled' : ''}>↓</button><button class="action-btn" onclick="renameExercise(${idx})">編集</button><button class="action-btn action-btn-danger" onclick="deleteExerciseFromList(${idx})">削除</button></td>`;
      tbody.appendChild(tr);
    });
  }

  function moveExercise(index, direction) {
    const cat = document.getElementById('edit-category').value, list = customExerciseCategories[cat];
    const newIndex = index + direction; if (newIndex < 0 || newIndex >= list.length) return;
    const temp = list[index]; list[index] = list[newIndex]; list[newIndex] = temp;
    saveCustomOrderState(cat); renderExerciseEditList(); updateExerciseList();
  }

  function renameExercise(index) {
    const cat = document.getElementById('edit-category').value, list = customExerciseCategories[cat], currentName = list[index];
    const newName = prompt("新しい種目名を入力してくれ．", currentName);
    if (newName && newName.trim() !== "" && newName !== currentName) {
      if (list.includes(newName.trim())) { alert("すでに存在する種目名だ．"); return; }
      list[index] = newName.trim(); saveCustomOrderState(cat); renderExerciseEditList(); updateExerciseList(); updateGlobalExerciseOptions();
    }
  }

  function deleteExerciseFromList(index) {
    const cat = document.getElementById('edit-category').value, list = customExerciseCategories[cat];
    if (confirm(`「${list[index]}」をリストから削除してもよいだろうか？`)) {
      list.splice(index, 1); saveCustomOrderState(cat); renderExerciseEditList(); updateExerciseList(); updateGlobalExerciseOptions();
    }
  }

  function addNewExercise() {
    const cat = document.getElementById('edit-category').value, newName = document.getElementById('new-exercise-name').value.trim();
    if (!newName) return;
    if (!customExerciseCategories[cat]) customExerciseCategories[cat] = [];
    if (customExerciseCategories[cat].includes(newName)) { alert("すでに存在する種目だ．"); return; }
    customExerciseCategories[cat].push(newName); document.getElementById('new-exercise-name').value = '';
    saveCustomOrderState(cat); renderExerciseEditList(); updateExerciseList(); updateGlobalExerciseOptions();
    showToast(`「${newName}」を追加したぞ！`, 'success');
  }

  function sortExercisesEdit(order) {
    const cat = document.getElementById('edit-category').value; if (!customExerciseCategories[cat]) return;
    customExerciseCategories[cat].sort((a, b) => order === 'asc' ? a.localeCompare(b, 'ja') : b.localeCompare(a, 'ja'));
    saveLocalCategories(); renderExerciseEditList(); updateExerciseList(); updateGlobalExerciseOptions();
  }

  function toggleGraphDateFilter() {
    const isChecked = document.getElementById('graph-date-filter-check').checked;
    document.getElementById('graph-date-inputs').style.display = isChecked ? 'block' : 'none';
    drawGraph();
  }

  function renderSetInputs() {
    const container = document.getElementById('set-inputs-container');
    const oldValues = {};
    const rows = container.querySelectorAll('.set-row');
    rows.forEach((row) => {
       const w = row.querySelector('input[id^="weight-"]');
       if(!w) return;
       const idx = w.id.split('-')[1];
       oldValues[idx] = {
         weight: document.getElementById(`weight-${idx}`).value,
         unit: document.getElementById(`unit-${idx}`).value,
         reps: document.getElementById(`reps-${idx}`).value,
         comment: document.getElementById(`set-comment-${idx}`) ? document.getElementById(`set-comment-${idx}`).value : '',
         star: currentSetRatings[idx] || 0
       };
    });

    const isCommon = document.getElementById('common-check').checked;
    const setCount = parseInt(document.getElementById('set-count').value) || 1;
    const showComments = document.getElementById('show-set-comments').checked;
    container.innerHTML = '';
    
    if (isCommon) { 
      const data = (window.tempDraftSets && window.tempDraftSets[0]) ? window.tempDraftSets[0] : (oldValues[0] || {});
      container.innerHTML = createSetRowHTML('全セット', 0, showComments, data); 
      if(data.star) setSetRating(0, data.star);
    } else { 
      for (let i = 1; i <= setCount; i++) { 
        const data = (window.tempDraftSets && window.tempDraftSets[i]) ? window.tempDraftSets[i] : (oldValues[i] || {});
        container.innerHTML += createSetRowHTML(`セット ${i}`, i, showComments, data); 
        if(data.star) setSetRating(i, data.star);
      } 
    }

    if (isCommon) { handleUnitChange(document.getElementById('unit-0'), 'reps-0'); } 
    else { for (let i = 1; i <= setCount; i++) { handleUnitChange(document.getElementById(`unit-${i}`), `reps-${i}`); } }
  }

  function createSetRowHTML(label, index, showComments, initData = {}) {
    const wVal = initData.weight !== undefined ? initData.weight : '';
    const uVal = initData.unit || currentUnit;
    const rVal = initData.reps !== undefined ? initData.reps : '';
    const cVal = initData.comment || '';
    const lbsSelected = uVal === 'lbs' ? 'selected' : ''; 
    const kgSelected = uVal === 'kg' ? 'selected' : '';
    const minSelected = uVal === '分' ? 'selected' : '';

    let commentHtml = '';
    if (showComments) {
      let activeStars = initData.star || 0;
      let starHtml = `<div class="star-rating-container" id="input-star-set-${index}" style="font-size: 22px; margin-left: 10px;">`;
      for(let i = 1; i <= 5; i++) { starHtml += `<span class="star ${i <= activeStars ? 'active' : ''}" onclick="setSetRating(${index}, ${i}); saveDraft();">★</span>`; }
      starHtml += `</div>`;
      commentHtml = `<div style="flex: 1 1 100%; margin-top: 5px; display:flex; align-items:center;"><input type="text" id="set-comment-${index}" value="${cVal}" placeholder="セットのメモ（任意）..." style="font-size: 14px; padding: 8px; flex:1;" oninput="saveDraft()">${starHtml}</div>`;
    }
    return `<div class="set-row"><div style="flex: 0.5;"><strong>${label}</strong></div><div><label>重量 / 時間</label><div class="weight-input-group"><input type="number" id="weight-${index}" min="0" step="${currentStep}" value="${wVal}" oninput="saveDraft()"><select id="unit-${index}" class="unit-select" onchange="handleUnitChange(this, 'reps-${index}'); saveDraft();"><option value="lbs" ${lbsSelected}>lbs</option><option value="kg" ${kgSelected}>kg</option><option value="分" ${minSelected}>分</option></select></div></div><div><label>回数</label><input type="number" id="reps-${index}" min="0" value="${rVal}" oninput="saveDraft()"></div>${commentHtml}</div>`;
  }

  function updateGlobalExerciseOptions() {
    const exercises = [...new Set(logs.map(log => log.exercise))];
    const updateSelect = (id) => {
      const el = document.getElementById(id);
      if (el) { const prev = el.value; el.innerHTML = ''; exercises.forEach(ex => { el.innerHTML += `<option value="${ex}">${ex}</option>`; }); if (prev && exercises.includes(prev)) el.value = prev; }
    };
    updateSelect('log-target-exercise'); updateSelect('graph-exercise'); updateSelect('review-target-exercise');
  }

  function addLog() {
    const category = document.getElementById('category').value;
    const exercise = document.getElementById('exercise').value;
    
    let datetime;
    if (document.getElementById('use-current-time-check').checked) {
      const now = new Date(); const tzOffset = now.getTimezoneOffset() * 60000;
      datetime = (new Date(now - tzOffset)).toISOString().slice(0, 16);
    } else {
      datetime = `${document.getElementById('record-date').value}T${document.getElementById('record-time').value}`;
    }
    
    const isRatingVisible = document.getElementById('input-rating-section').style.display !== 'none';
    const finalRating = isRatingVisible ? currentInputRating : 0;
    const finalComment = isRatingVisible ? document.getElementById('input-comment').value.trim() : "";
    
    if (!exercise) { showToast('種目を選択してくれ！', 'error'); return; }
    
    const isCommon = document.getElementById('common-check').checked;
    const setCount = parseInt(document.getElementById('set-count').value) || 1;
    const showSetComments = document.getElementById('show-set-comments').checked;
    let logEntry = { id: Date.now(), date: datetime, category: category, exercise: exercise, rating: finalRating, comment: finalComment, sets: [] };
    
    if (isCommon) {
      const w = parseFloat(document.getElementById('weight-0').value) || 0, u = document.getElementById('unit-0').value, r = parseInt(document.getElementById('reps-0').value) || 0, c = showSetComments ? document.getElementById('set-comment-0').value.trim() : "", sRating = showSetComments ? (currentSetRatings[0] || 0) : 0;
      for (let i = 1; i <= setCount; i++) logEntry.sets.push({ setIndex: i, weight: w, unit: u, reps: r, rating: sRating, comment: c });
    } else {
      for (let i = 1; i <= setCount; i++) {
        const w = parseFloat(document.getElementById(`weight-${i}`).value) || 0, u = document.getElementById(`unit-${i}`).value, r = parseInt(document.getElementById(`reps-${i}`).value) || 0, c = showSetComments ? document.getElementById(`set-comment-${i}`).value.trim() : "", sRating = showSetComments ? (currentSetRatings[i] || 0) : 0;
        logEntry.sets.push({ setIndex: i, weight: w, unit: u, reps: r, rating: sRating, comment: c });
      }
    }
    
    logs.push(logEntry); 
    saveLocalData(); 
    updateGlobalExerciseOptions(); 
    updateLogUI(); 
    updateReviewUI(); 
    drawGraph(); 
    
    resetAfterSubmit();
    
    showToast('記録を追加したぞ！', 'success');
    if (gAccessToken && isGapiLoaded) saveToDrive(true);
  }

  function renderLogList() {
    const mode = document.getElementById('log-view-mode').value;
    const currentViewMode = mode === 'date' ? logDateViewMode : logExerciseViewMode;
    const container = document.getElementById('log-list');
    container.innerHTML = ''; 
    
    if (logs.length === 0) { 
      container.innerHTML = '<p>データがありません．</p>'; 
      return; 
    }
    
    let filteredLogs = logs;
    
    if (currentViewMode === 'single') {
      const targetDate = document.getElementById('log-single-date').value;
      if (!targetDate) return;
      filteredLogs = filteredLogs.filter(log => log.date.startsWith(targetDate));
    } else {
      const useDateFilter = document.getElementById('log-date-filter-check').checked;
      if (useDateFilter) {
        const start = document.getElementById('log-start-date').value;
        const end = document.getElementById('log-end-date').value;
        filteredLogs = filteredLogs.filter(log => { 
          const d = log.date.split('T')[0]; 
          return (!start || d >= start) && (!end || d <= end); 
        });
      }
    }

    if (mode === 'exercise') {
      const target = document.getElementById('log-target-exercise').value;
      if (target) {
        filteredLogs = filteredLogs.filter(log => log.exercise === target);
      } else {
        container.innerHTML = '<p>種目を選択してくれ．</p>'; 
        return; 
      }
    }

    if (filteredLogs.length === 0) { 
      container.innerHTML = '<p>指定された条件のデータがありません．</p>'; 
      return; 
    }

    if (mode === 'date') {
      const grouped = {}; 
      filteredLogs.forEach(log => { 
        const d = log.date.split('T')[0]; 
        if (!grouped[d]) grouped[d] = []; 
        grouped[d].push(log); 
      });
      let dates = Object.keys(grouped);
      
      if (currentViewMode === 'list') {
        const dateSort = document.getElementById('log-date-sort').value;
        dates.sort((a, b) => dateSort === 'date-asc' ? a.localeCompare(b) : b.localeCompare(a));
      }

      dates.forEach(date => {
        let html = `<h4>${date} <span style="font-size:16px;">${dailyEvals[date] ? getStaticStarHtml(dailyEvals[date].rating) : ''}</span></h4><div class="scroll-wrapper"><table><tr><th>時刻</th><th>カテゴリ</th><th>種目</th><th>セット</th><th>重量/時間</th><th>回数</th><th>操作</th></tr>`;
        grouped[date].sort((a, b) => a.date.localeCompare(b.date)).forEach(log => {
          const rowCount = log.sets.length; const time = log.date.split('T')[1];
          log.sets.forEach((s, idx) => {
            html += `<tr>`;
            if (idx === 0) { html += `<td rowspan="${rowCount}" style="vertical-align: top;">${time}</td><td rowspan="${rowCount}" style="vertical-align: top;">${log.category}</td><td rowspan="${rowCount}" style="vertical-align: top;">${log.exercise}<br><span style="font-size:14px; margin-top:4px; display:inline-block;">${getStaticStarHtml(log.rating)}</span></td>`; }
            let repsStr = s.unit === '分' ? '-' : s.reps;
            html += `<td style="vertical-align: top;">${s.setIndex}<br><span style="font-size:12px;">${getStaticStarHtml(s.rating)}</span></td><td style="vertical-align: top;">${s.weight}${s.unit}</td><td style="vertical-align: top;">${repsStr}</td><td style="white-space: nowrap; vertical-align: top;"><button class="action-btn" onclick="openEditModal(${log.id}, ${s.setIndex})">編集</button><button class="action-btn action-btn-danger" onclick="deleteSet(${log.id}, ${s.setIndex})">削除</button></td></tr>`;
          });
        });
        container.innerHTML += html + `</table></div><br>`;
      });
    } else if (mode === 'exercise') {
      const sort = document.getElementById('log-sort-mode').value;
      const target = document.getElementById('log-target-exercise').value;

      filteredLogs.sort((a, b) => {
        let maxWA = Math.max(...a.sets.map(s => s.unit === 'kg' ? s.weight * 2.20462 : s.weight), 0), maxWB = Math.max(...b.sets.map(s => s.unit === 'kg' ? s.weight * 2.20462 : s.weight), 0);
        let maxRA = Math.max(...a.sets.map(s => s.reps), 0), maxRB = Math.max(...b.sets.map(s => s.reps), 0);
        switch(sort) { case 'date-desc': return b.date.localeCompare(a.date); case 'date-asc': return a.date.localeCompare(b.date); case 'weight-desc': return maxWB - maxWA; case 'weight-asc': return maxWA - maxWB; case 'reps-desc': return maxRB - maxRA; case 'reps-asc': return maxRA - maxRB; default: return 0; }
      });

      let html = `<h4>${target}</h4><div class="scroll-wrapper"><table><tr><th>日時</th><th>セット</th><th>重量/時間</th><th>回数</th>${showLogSetDetails ? '<th>詳細(評価/コメント)</th>' : ''}<th>操作</th></tr>`;
      filteredLogs.forEach(log => { 
        const dtStr = log.date.replace('T', ' '), rowCount = log.sets.length;
        log.sets.forEach((s, idx) => {
          html += `<tr>`;
          if (idx === 0) { html += `<td rowspan="${rowCount}" style="vertical-align: top;">${dtStr}<br><span style="font-size:14px; margin-top:4px; display:inline-block;">${getStaticStarHtml(log.rating)}</span></td>`; }
          let repsStr = s.unit === '分' ? '-' : s.reps;
          
          if (showLogSetDetails) {
            html += `<td style="vertical-align: top;">${s.setIndex}</td><td style="vertical-align: top;">${s.weight}${s.unit}</td><td style="vertical-align: top;">${repsStr}</td><td style="vertical-align: top;"><span style="font-size:12px;">${getStaticStarHtml(s.rating)}</span><div style="font-size:12px; margin-top:4px; color:var(--text-color); opacity:0.8;">${s.comment || ''}</div></td>`;
          } else {
            html += `<td style="vertical-align: top;">${s.setIndex}<br><span style="font-size:12px;">${getStaticStarHtml(s.rating)}</span></td><td style="vertical-align: top;">${s.weight}${s.unit}</td><td style="vertical-align: top;">${repsStr}</td>`;
          }
          
          html += `<td style="white-space: nowrap; vertical-align: top;"><button class="action-btn" onclick="openEditModal(${log.id}, ${s.setIndex})">編集</button><button class="action-btn action-btn-danger" onclick="deleteSet(${log.id}, ${s.setIndex})">削除</button></td></tr>`;
        });
      });
      container.innerHTML = html + `</table></div>`;
    }
  }

  function renderReviewList() {

    container.innerHTML = ''; if (logs.length === 0) { container.innerHTML = '<p>データがありません．</p>'; return; }

    if (level === 'day') currentViewMode = reviewDayDateViewMode;
    else if (level === 'exercise') currentViewMode = reviewExerciseDateViewMode;

        const start = document.getElementById('review-start-date').value, end = document.getElementById('review-end-date').value;
        filteredLogs = filteredLogs.filter(log => { const d = log.date.split('T')[0]; return (!start || d >= start) && (!end || d <= end); });

      const target = document.getElementById('review-target-exercise').value;
      if (target) filteredLogs = filteredLogs.filter(log => log.exercise === target);
    }
    
    if (filteredLogs.length === 0) { container.innerHTML = '<p>条件に合うデータがありません．</p>'; return; }
    
    if (level === 'day') {

    } else if (level === 'exercise') {

        });
      });
    }

  function updateReviewRating(level, identifier, rating) {
    if (level === 'day') { if (!dailyEvals[identifier]) dailyEvals[identifier] = { rating: 0, comment: '' }; dailyEvals[identifier].rating = rating; } 
    else if (level === 'exercise') { const log = logs.find(l => l.id == identifier); if (log) log.rating = rating; } 
    else if (level === 'set') { const [logId, setIdx] = identifier.split('_'); const log = logs.find(l => l.id == logId); if (log) { const set = log.sets.find(s => s.setIndex == setIdx); if (set) set.rating = rating; } }
    saveLocalData(); if (gAccessToken && isGapiLoaded) saveToDrive(true);
    const container = document.getElementById(`star-container-${level}-${identifier}`);
    if (container) container.querySelectorAll('.star').forEach((star, index) => { if (index < rating) star.classList.add('active'); else star.classList.remove('active'); });
    updateLogUI(); 
  }

  function saveReviewComment(level, identifier) {
    const textarea = document.getElementById(`comment-${level}-${identifier}`); if (!textarea) return; const comment = textarea.value;
    if (level === 'day') { if (!dailyEvals[identifier]) dailyEvals[identifier] = { rating: 0, comment: '' }; dailyEvals[identifier].comment = comment; } 
    else if (level === 'exercise') { const log = logs.find(l => l.id == identifier); if (log) log.comment = comment; } 
    else if (level === 'set') { const [logId, setIdx] = identifier.split('_'); const log = logs.find(l => l.id == logId); if (log) { const set = log.sets.find(s => s.setIndex == setIdx); if (set) set.comment = comment; } }
    saveLocalData(); if (gAccessToken && isGapiLoaded) saveToDrive(true);
    const btn = document.getElementById(`save-btn-${level}-${identifier}`), originalText = btn.innerText; btn.innerText = "保存完了！"; btn.style.background = "linear-gradient(to bottom, #7ceeb0 0%, #30d676 100%)";
    setTimeout(() => { btn.innerText = originalText; btn.style.background = ""; }, 1500); showToast('コメントを保存したぞ！', 'success');
  }

  // --- グラフ分析ロジック ---
  function drawGraph() {
    const container = document.getElementById('chart-container'), exercise = document.getElementById('graph-exercise').value, targetUnit = document.getElementById('graph-unit').value, isDark = document.body.classList.contains('mode-dark');
    container.innerHTML = ''; if (!exercise) { container.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400"><text x="20" y="30" fill="${isDark?'#ffffff':'#000000'}" font-size="14">データがありません．</text></svg>`; return; }
    let exLogs = logs.filter(log => log.exercise === exercise);
    if (document.getElementById('graph-date-filter-check').checked) {
      const start = document.getElementById('graph-start-date').value, end = document.getElementById('graph-end-date').value;
      exLogs = exLogs.filter(log => { const d = log.date.split('T')[0]; return (!start || d >= start) && (!end || d <= end); });
    }
    if (exLogs.length === 0) { container.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400"><text x="20" y="30" fill="${isDark?'#ffffff':'#000000'}" font-size="14">指定範囲にデータがありません．</text></svg>`; return; }
    let pts = []; exLogs.forEach((log, idx) => log.sets.forEach(set => { let w = parseFloat(set.weight) || 0; if (targetUnit === 'lbs' && set.unit === 'kg') w *= 2.20462; else if (targetUnit === 'kg' && set.unit === 'lbs') w /= 2.20462; pts.push({ t: new Date(log.date).getTime(), idx: idx, sIdx: set.setIndex, r: parseFloat(set.reps) || 0, w: w, ow: set.weight, u: set.unit, d: log.date.replace('T', ' ') }); }));
    pts.sort((a, b) => a.t !== b.t ? a.t - b.t : a.sIdx - b.sIdx);
    let maxX = Math.ceil(Math.max(...pts.map(p => p.r), 5) * 1.2), maxYReal = Math.max(...pts.map(p => p.w), 5), maxY = Math.ceil(maxYReal / 5) * 5;
    const padL = 50, padR = 30, padT = 30, padB = 40, ySteps = Math.ceil(maxY / 5), yP = 40, plotH = Math.max(300, ySteps * yP), baseH = plotH + padT + padB, xSteps = Math.min(maxX, 10), xP = 30, plotW = Math.max(500, maxX * xP), baseW = Math.max(600, plotW + padL + padR);
    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${baseW}" height="${baseH}" viewBox="0 0 ${baseW} ${baseH}">`;
    const gridC = isDark ? '#444444' : '#cccccc', axisC = isDark ? '#ffffff' : '#000000';
    for (let i = 0; i <= ySteps; i++) { const yV = maxY * (i / ySteps), py = padT + plotH - (yV / maxY) * plotH; svg += `<line x1="${padL}" y1="${py}" x2="${baseW - padR}" y2="${py}" stroke="${gridC}" /><text x="${padL - 5}" y="${py}" fill="${axisC}" font-size="12" text-anchor="end" alignment-baseline="middle">${yV.toFixed(1)}</text>`; }
    for (let i = 0; i <= xSteps; i++) { const xV = maxX * (i / xSteps), px = padL + (xV / maxX) * plotW; svg += `<line x1="${px}" y1="${padT + plotH}" x2="${px}" y2="${padT + plotH + 5}" stroke="${axisC}" /><text x="${px}" y="${padT + plotH + 20}" fill="${axisC}" font-size="12" text-anchor="middle">${Math.round(xV)}</text>`; }
    svg += `<polyline points="${padL},${padT} ${padL},${padT + plotH} ${baseW - padR},${padT + plotH}" fill="none" stroke="${axisC}" stroke-width="2" /><text x="${padL}" y="${padT - 10}" fill="${axisC}" font-size="12">重量(${targetUnit})</text><text x="${baseW - padR}" y="${padT + plotH + 35}" fill="${axisC}" font-size="12" text-anchor="end">回数</text>`;
    
    if (document.getElementById('graph-show-arrows').checked && pts.length > 1) { 
      const arrowColor = document.getElementById('arrow-color').value;
      let defsHtml = `<defs><marker id="arr" markerWidth="10" markerHeight="7" refX="14" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="${arrowColor}" /></marker>`;
      for (let i = 0; i < pts.length - 1; i++) { 
        const p1 = pts[i], p2 = pts[i+1];
        const x1 = padL + (p1.r / maxX) * plotW, y1 = padT + plotH - (p1.w / maxY) * plotH, x2 = padL + (p2.r / maxX) * plotW, y2 = padT + plotH - (p2.w / maxY) * plotH;
        const dx = x2 - x1, dy = y2 - y1, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 0.1) {
          defsHtml += `<linearGradient id="grad-${i}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="${arrowColor}" stop-opacity="0.1" /><stop offset="100%" stop-color="${arrowColor}" stop-opacity="1" /></linearGradient>`;
        }
      } 
      defsHtml += `</defs>`;
      svg += defsHtml;

      for (let i = 0; i < pts.length - 1; i++) { 
        const p1 = pts[i], p2 = pts[i+1];
        const x1 = padL + (p1.r / maxX) * plotW, y1 = padT + plotH - (p1.w / maxY) * plotH, x2 = padL + (p2.r / maxX) * plotW, y2 = padT + plotH - (p2.w / maxY) * plotH;
        const dx = x2 - x1, dy = y2 - y1, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 0.1) {
          const offset = 15, nx = -dy / dist * offset, ny = dx / dist * offset, cx = (x1 + x2)/2 + nx, cy = (y1 + y2)/2 + ny;
          svg += `<path d="M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}" fill="none" stroke="url(#grad-${i})" stroke-width="${document.getElementById('arrow-thickness').value}" marker-end="url(#arr)"/>`;
        }
      } 
    }
    
    pts.forEach(p => { const h = (p.idx * 137) % 360, x = padL + (p.r / maxX) * plotW, y = padT + plotH - (p.w / maxY) * plotH; svg += `<circle cx="${x}" cy="${y}" r="6" fill="hsl(${h},80%,60%)" stroke="hsl(${h},80%,40%)" stroke-width="2" onmouseover="showTooltip(event, '${p.d}', ${p.sIdx}, ${p.ow}, '${p.u}', ${p.r})" onmousemove="showTooltip(event, '${p.d}', ${p.sIdx}, ${p.ow}, '${p.u}', ${p.r})" ontouchstart="showTooltip(event, '${p.d}', ${p.sIdx}, ${p.ow}, '${p.u}', ${p.r})" onmouseleave="hideTooltip()" ontouchend="hideTooltip()" style="cursor: pointer;" />`; });
    container.innerHTML = svg + `</svg>`;
  }

  function downloadGraph() {
    const svg = document.getElementById('chart-container').querySelector('svg'); if (!svg || svg.textContent.includes('データがありません')) { alert('グラフを描画してくれ．'); return; }
    const format = document.getElementById('download-format').value, date = new Date().toISOString().split('T')[0], ex = document.getElementById('graph-exercise').value, fname = `workout_${ex}_${date}.${format}`, svgD = new XMLSerializer().serializeToString(svg);
    if (format === 'svg') { triggerDownload(URL.createObjectURL(new Blob([svgD], { type: 'image/svg+xml;charset=utf-8' })), fname); return; }
    const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d'), scale = 3, w = svg.viewBox.baseVal.width, h = svg.viewBox.baseVal.height;
    canvas.width = w * scale; canvas.height = h * scale; ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg-color'); ctx.fillRect(0, 0, canvas.width, canvas.height);
    const img = new Image(); img.crossOrigin = "anonymous";
    img.onload = () => { ctx.drawImage(img, 0, 0, canvas.width, canvas.height); canvas.toBlob(blob => { if (blob) triggerDownload(URL.createObjectURL(blob), fname); }, format === 'jpeg' ? 'image/jpeg' : 'image/png', 1.0); };
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgD);
  }

  function triggerDownload(url, fname) { const a = document.createElement('a'); a.href = url; a.download = fname; document.body.appendChild(a); a.click(); document.body.removeChild(a); if (url.startsWith('blob:')) setTimeout(() => URL.revokeObjectURL(url), 1000); }
  
  function showTooltip(e, d, si, w, u, r) { 
    const t = document.getElementById('tooltip'); 
    const touch = e.touches ? e.touches[0] : e;
    t.style.display = 'block'; 
    t.style.left = (touch.pageX + 15) + 'px'; 
    t.style.top = (touch.pageY + 15) + 'px'; 
    t.innerHTML = `${d}<br>第${si}セット: ${w}${u} × ${r}回`; 
  }
  
  function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

  function deleteSet(logId, setIndex) {
    if (!confirm('このセットを削除してもよいだろうか？')) return;
    const logIndex = logs.findIndex(l => l.id === logId);
    if (logIndex > -1) {
      let log = logs[logIndex]; log.sets = log.sets.filter(s => s.setIndex !== setIndex);
      if (log.sets.length === 0) logs.splice(logIndex, 1); else log.sets.forEach((s, idx) => s.setIndex = idx + 1);
      saveLocalData(); updateLogUI(); drawGraph(); updateReviewUI(); updateGlobalExerciseOptions();
      if (gAccessToken && isGapiLoaded) saveToDrive(true);
      showToast('記録を削除したぞ．', 'error');
    }
  }

  function openEditModal(logId, setIndex) {
    const log = logs.find(l => l.id === logId), set = log.sets.find(s => s.setIndex === setIndex);
    editingLogId = logId; editingSetIndex = setIndex; currentEditRating = log.rating || 0;
    updateStarUI('edit-star-rating', currentEditRating);
    document.getElementById('edit-weight').value = set.weight; document.getElementById('edit-unit').value = set.unit;
    document.getElementById('edit-reps').value = set.reps; document.getElementById('edit-weight').step = currentStep;
    document.getElementById('edit-modal-overlay').style.display = 'flex';
  }

  function closeEditModal() { document.getElementById('edit-modal-overlay').style.display = 'none'; }
  
  function saveEdit() {
    const log = logs.find(l => l.id === editingLogId), set = log.sets.find(s => s.setIndex === editingSetIndex);
    if (log && set) {
      log.rating = currentEditRating; set.weight = parseFloat(document.getElementById('edit-weight').value) || 0;
      set.unit = document.getElementById('edit-unit').value; set.reps = parseInt(document.getElementById('edit-reps').value) || 0;
      saveLocalData(); updateLogUI(); drawGraph(); updateReviewUI(); 
      if (gAccessToken && isGapiLoaded) saveToDrive(true);
      showToast('記録を編集したぞ！', 'success');
    }
    closeEditModal();
  }

  window.onload = function() { 
    loadLocalCategories(); 
    loadLocalData(); 
    loadLocalSettings(); 
    resetInputForm(); 
    updateTheme(); 
    updateGlobalExerciseOptions(); 
    switchTab('input');
  };
</script>
